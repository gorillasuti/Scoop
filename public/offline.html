<!DOCTYPE html>
<html lang="hu">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#FCF9F8" />
  <title>Scoop - Offline</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      font-family: system-ui, -apple-system, sans-serif;
      background: #fcf9f8;
      color: #1c1b1b;
      text-align: center;
    }

    .card {
      max-width: 22rem;
      background: #fff;
      border: 2px solid #e5e2e1;
      border-radius: 1.5rem;
      padding: 2rem 1.5rem;
      box-shadow: 0 4px 0 #e5e2e1;
    }

    .emoji {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 1.35rem;
      font-weight: 800;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 0.95rem;
      color: #5c5959;
      line-height: 1.5;
      margin-bottom: 1.25rem;
      font-weight: 600;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 0.9rem 1.25rem;
      font-size: 1rem;
      font-weight: 800;
      color: #fff;
      background: #007bff;
      box-shadow: 0 4px 0 #0056b3;
      cursor: pointer;
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #0056b3;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="emoji">📡</div>
    <h1>Nincs kapcsolat</h1>
    <p>A Scoop szerver jelenleg nem elérhető. Ellenőrizd a hálózatot, vagy várj amíg a szerver újraindul.</p>
    <button type="button" onclick="window.location.reload()">Újrapróbálás</button>
  </div>
</body>

</html>
